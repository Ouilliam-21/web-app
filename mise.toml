[tools]
node = "22.18.0"

[env]
_.file = '.env'

[tasks.install]
description = "Install package"
run = "pnpm install"

[tasks.build]
description = "Build the nuxt application"
run = "pnpm run build"

[tasks.dev]
description = "Run the dev application"
run = "pnpm run dev"

[tasks.typecheck]
description = "Run the typechecker"
run = "pnpm nuxt typecheck"

[tasks.lint]
description = "Run the lint"
run = "pnpm exec eslint --ext .js,.ts,.vue . --fix"

[tasks.knip]
description = "Run the knip"
run = "pnpm nuxt prepare && pnpm exec knip --production --include files,dependencies"

[tasks.validate]
description = "Run the lint && typechecker && knip"
run = "mise lint && mise typecheck && mise knip"

[tasks.act_validate]
description = "Run the github action validate locally"
run = "act -W .github/workflows/validate.yml"

[tasks.act_preview]
description = "Run the github action preview locally"
run = "act --secret-file .act.env -W .github/workflows/preview.yml"
